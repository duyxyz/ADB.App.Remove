name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Kích hoạt khi có tag bắt đầu bằng v (ví dụ: v1.0.0)
  workflow_dispatch:  # Cho phép chạy thủ công từ GitHub Actions tab

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write  # Cấp quyền để tạo GitHub Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --icon="app_icon.ico" "adb_uninstaller.py"

      - name: Prepare Release Archive
        run: |
          mkdir release_package
          copy dist\adb_uninstaller.exe release_package\
          copy adb.exe release_package\
          copy AdbWinApi.dll release_package\
          copy AdbWinUsbApi.dll release_package\
          copy fastboot.exe release_package\
          copy app_icon.ico release_package\
          copy README.md release_package\
          copy LICENSE release_package\
          Compress-Archive -Path release_package\* -DestinationPath ADB-App-Remover-Windows.zip

      - name: Upload Artifact (For checking)
        uses: actions/upload-artifact@v4
        with:
          name: ADB-App-Remover-Zip
          path: ADB-App-Remover-Windows.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ADB-App-Remover-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
